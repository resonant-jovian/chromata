name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  INSTA_UPDATE: no

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, "1.85.0"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      # Integration features (ratatui, egui, iced) require newer rustc than MSRV.
      # Test all theme features on MSRV; test --all-features only on stable.
      - name: Test (MSRV — theme features only)
        if: matrix.rust != 'stable'
        run: cargo test --features popular,base16,base24,vim,emacs,serde-support --verbose -- --test-threads=1
      - name: Test (stable — all features)
        if: matrix.rust == 'stable'
        run: cargo test --all-features --verbose -- --test-threads=1

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  docs:
    name: Doc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features
      - run: cargo test --doc --all-features

  no-std:
    name: no_std compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --no-default-features

  wasm:
    name: WASM compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo check --target wasm32-unknown-unknown --no-default-features
      - run: cargo check --target wasm32-unknown-unknown --features popular

  feature-isolation:
    name: Feature isolation (${{ matrix.family }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        family: [popular, base16, base24, vim, emacs]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --no-default-features --features ${{ matrix.family }}

  freshness:
    name: Generated files check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo xtask check

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --dry-run
