name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit tests (debug)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run unit tests
      run: cargo test --verbose --lib --bins -- --test-threads=1

  validation-tests:
    name: Validation tests (release)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build (release)
      run: cargo build --release --verbose
    - name: Run all tests (release, sequential)
      run: cargo test --release --verbose -- --test-threads=1

  all-features-test:
    name: All features test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build all features
      run: cargo build --all-features --verbose
    - name: Test all features
      run: cargo test --all-features --verbose -- --test-threads=1

  no-std-check:
    name: no_std compatibility
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check no_std builds
      run: cargo check --no-default-features

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: "1.85.0"
    - run: cargo check --all-features

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - run: cargo fmt --all -- --check
